[technology-description]
hm-hive-spawners=The hive learns to organise itself. Hive Nodes can now be constructed to extend your reach.
hm-hive-labs=The hive develops a research apparatus. Hive Labs can now be built to convert absorbed pollution into science.
hm-worms-small=The hive can cultivate small worm turrets to defend its territory.
hm-worms-medium=The hive can cultivate medium worm turrets, hardier and with greater range.
hm-worms-big=The hive can cultivate big worm turrets capable of threatening armoured threats.
hm-worms-behemoth=The hive reaches its apex. Behemoth worms defend hive territory with overwhelming force.
hm-attraction-reach=The hive's pheromone broadcast carries further. Each level extends the radius from which biters are drawn into the hive.

[effect-description]
hm-attraction-reach=+10% attraction radius
