hm-promote-node=Promotion marker. Crafting Promote Node converts the closest Hive Node within range to a new Hive in place; costs pollution from the network.
hm-pollution=Concentrated pollution harvested from absorbed creatures. Used to build hive structures and fuel research.
hm-pollution-science-pack=Research biomass condensed from absorbed pollution and converted creatures.
