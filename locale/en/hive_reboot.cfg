[mod-setting-name]
hm-anchor-binding=Hive Anchor Binding
hm-evolution-gate=Hive Evolution Gate

[mod-setting-description]
hm-anchor-binding=When enabled, your hive is permanent: you receive one Hive item on join, placement takes 30 seconds and binds the hive to that position, and the entity cannot be mined afterward. Multiple hives only via Promote Node. Losing every hive in the network grants you a fresh starter. When disabled the Hive recipe is always available and you can re-place freely (default; legacy 0.9.16 behaviour).
hm-evolution-gate=When enabled, the Nth Hive Node placement in a network requires the surface's enemy evolution factor to be at or above (N - 1) * 0.05. The engineer's pollution drives evolution, so node growth self-paces against engineer progress. When disabled, node placement is unbounded (default; legacy behaviour).

[message]
hm-tech-required=The hive has not yet evolved the knowledge to build that structure.
hm-no-hive-in-range=No hive is within range to fulfil that construction.
hm-insufficient-resources=Insufficient pollution: __2__ / __1__ (have / need).
hm-insufficient-resources-generic=Insufficient pollution to build that.
hm-no-mining=The hive presence cannot mine.
hm-placement-obstructed=Cannot build there: the hive does not clear trees, rocks, or cliffs.
hm-pheromone-vent-no-hive=A Pheromone Vent needs a Hive to anchor it. The vent collapses.
hm-anchor-construction-started=Hive construction started. It is extremely hard to move and will permanently bind your hive to this position.
hm-node-evolution-gated=Cannot place node __3__: requires evolution __1__ (current __2__). The engineer's progress paces your expansion.
hm-promote-node-no-target=No Hive Node within __1__ tiles. Stand near the node you want to promote and try again.
hm-promote-node-not-in-network=That node is not part of your network.
hm-promote-node-insufficient=Insufficient pollution to promote: __2__ / __1__ (have / need).
hm-promote-node-no-network=No hive network covers this position; promotion needs a network to charge against.
hm-promote-node-failed=Promotion failed; the engine could not place a hive at that position.
hm-promote-node-success=Hive Node promoted. The network has a new recruit pole.

