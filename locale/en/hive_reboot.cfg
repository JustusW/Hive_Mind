[entity-description]
hm-hive=The core of the hive mind. Stores creatures, dispatches workers, and anchors your presence. Only one may exist per player.
hm-hive-node=Extends the hive's construction and logistics reach. Built by hive workers; requires Hive Spawners research.
hm-hive-lab=A research node fed directly by hive pollution. Consumes Pollution Science Packs to advance hive knowledge.
hm-construction-robot=A living hive worker dispatched to construct structures. It dies at the build site once the work is done.
hm-hive-storage=The hive's creature repository. Absorbed biters are stored here and drawn upon for construction and research.
hm-pollution-generator=DEBUG: Continuously vents pollution equivalent to 1000 active coal miners.
hm-spawner-ghost=A construction site. The hive is growing a new spawner here.
hm-small-worm-ghost=A construction site. The hive is growing a small worm here.
hm-medium-worm-ghost=A construction site. The hive is growing a medium worm here.
hm-big-worm-ghost=A construction site. The hive is growing a big worm here.
hm-behemoth-worm-ghost=A construction site. The hive is growing a behemoth worm here.

